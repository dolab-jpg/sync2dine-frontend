name: Deploy Sally API prompts

# Ships server-side Sally voice/humour to the live Sync2Dine API (port 3011).
# SPA deploy is separate — this only SCPs prompt files + restarts the Node API.

on:
  push:
    branches:
      - master
    paths:
      - 'server/sally-sales.ts'
      - 'server/orchestrator-prompt.ts'
      - '.github/workflows/deploy-sally-api.yml'
  workflow_dispatch:

jobs:
  deploy-sally-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload Sally prompt files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: server/sally-sales.ts,server/orchestrator-prompt.ts
          target: /var/www/vhosts/sync2dine.io/sync2dine-backend/server/
          strip_components: 1

      - name: Restart Sync2Dine API
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BE=/var/www/vhosts/sync2dine.io/sync2dine-backend
            cd "$BE"
            grep -n "VOICE & HUMOUR" server/sally-sales.ts | head -5 || {
              echo "ERROR: Cockney VOICE & HUMOUR block missing from sally-sales.ts on VPS"
              exit 1
            }
            pkill -f 'sync2dine.io/sync2dine-backend.*server/index.ts' || true
            sleep 2
            nohup /opt/plesk/node/24/bin/node \
              --require ./node_modules/tsx/dist/preflight.cjs \
              --import file:///var/www/vhosts/sync2dine.io/sync2dine-backend/node_modules/tsx/dist/loader.mjs \
              --env-file=.env server/index.ts \
              >/tmp/sync2dine-api.log 2>&1 &
            sleep 6
            pgrep -af 'sync2dine.io/sync2dine-backend.*server/index.ts' | head -3
            curl -sS --max-time 10 https://app.sync2dine.io/health
            echo
            curl -sS --max-time 60 -X POST https://app.sync2dine.io/api/sally/web \
              -H 'Content-Type: application/json' \
              -H 'Origin: https://sync2dine.io' \
              -d '{"sessionId":"web_cockney_ci","text":"Who are you then?","page":"/"}' | head -c 900
            echo
