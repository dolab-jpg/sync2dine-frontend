name: Deploy Sally API prompts (DISABLED)

# DISABLED — frontend must not SCP prompt files onto the live backend.
# Sally SoT is sync2dine-backend (server/sally-sales.ts + server/phone/sally-sales-phone.ts).
# Deploy via: bash scripts/push-live-local.sh (from FE, syncs sibling backend).

on:
  workflow_dispatch:
    inputs:
      acknowledge:
        description: 'Type DISABLED — this workflow no longer deploys'
        required: true

jobs:
  refuse:
    runs-on: ubuntu-latest
    steps:
      - name: Refuse FE→BE Sally overwrite
        run: |
          echo "::error::deploy-sally-api is disabled. Edit Sally prompts in sync2dine-backend and deploy with push-live-local.sh (API sync from sibling backend). Do not SCP frontend server/ files onto the VPS."
          exit 1
