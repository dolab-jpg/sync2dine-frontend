name: Deploy Sync2Dine frontend

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  SYNC2DINE_DOCROOT: /var/www/vhosts/sync2dine.io/app.sync2dine.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_DEMO_LOGIN: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: sync2dine-spa
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check VPS secrets present
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "host_len=${#VPS_HOST} user_len=${#VPS_USER} key_len=${#VPS_SSH_KEY}"
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing VPS_HOST / VPS_USER / VPS_SSH_KEY GitHub secrets — cannot SSH to live SPA"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          name: sync2dine-spa
          path: dist

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: dist/*
          target: ${{ env.SYNC2DINE_DOCROOT }}
          strip_components: 1
