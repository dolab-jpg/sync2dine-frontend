name: Frontend tests

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  responsive:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:bridge
      - run: npm run test:responsive
        env:
          CI: true
