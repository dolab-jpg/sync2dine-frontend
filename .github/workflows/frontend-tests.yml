name: Frontend tests

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  responsive:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npx playwright install chromium
      - run: npm run test:bridge
      # No backend runs in CI: the Vite dev server proxies /api/* and /webhooks/*
      # to VITE_API_BASE_URL (sync2dine-backend, a separate repo we don't check out
      # here) and returns a fast JSON 502 when it's unreachable. Playwright suites
      # don't assert on /api responses — tests that need real auth already skip
      # themselves when VITE_SUPABASE_URL / E2E_* credentials are not set.
      - run: npm run test:responsive
        env:
          CI: true
          VITE_API_BASE_URL: http://localhost:3001
